dataset_name: tahoe
model_name: JIT_LLM

cell_sentence_len: 512
cellmap_width: 512

layers_before_pool:
  pert_onehot:
    num_embeddings: 1138
    input_dim: 256
    layer_type: embedding
    dims: [256, 256]
    dropout_rate: 0.0

  batch_onehot:
    num_embeddings: 14 # plate
    input_dim: 256
    layer_type: embedding
    dims: [256, 256]
    dropout_rate: 0.0

  cell_type_onehot:
    num_embeddings: 50 # cell_line
    input_dim: 256
    layer_type: embedding
    dims: [256, 256]
    dropout_rate: 0.0

layers_after_pool:
  layer_type: mlp
  input_dim: -1
  dims: [512, 512]
  dropout_rate: 0.0
  act_last_layer: true
  act_fn: SiLU

layers_for_aggregation:
  layer_type: mlp
  input_dim: 1024
  dims: [1024, 512]
  dropout_rate: 0.0
  act_last_layer: true
  act_fn: SiLU

prepare_model:
  cell_dim: 2000
  n_decoder_layers: 4
  learning_rate: 5e-4
  batch_class: 14
  cell_class: 50
  hidden_channels: 32
  transformer_backbone_kwargs:
      backbone_name: llama
      vocab_size: 100
      hidden_size: ${cellmap_width}
      intermediate_size: 1024
      num_hidden_layers: 4
      num_attention_heads: 8
      num_key_value_heads: 8
      max_position_embeddings: ${cell_sentence_len}

  condition_mode: deterministic
  pool_sample_covariates: true
  regularization: 0.0

  pooling: attention_token
  pooling_kwargs:
    num_heads: 8
    pool_method: mean

  layers_before_pool: ${layers_before_pool}
  layers_after_pool: ${layers_after_pool}
  layers_for_aggregation: ${layers_for_aggregation}
  condition_embedding_dim: 256
  cond_output_dropout: 0.9
  condition_encoder_kwargs: {}
  time_freqs: 512
  time_max_period: 10000
  time_encoder_dims: [1024, 512]
  time_encoder_dropout: 0.0
  hidden_dims: [2048, 2048, 2048]
  hidden_dropout: 0.0
  src_loss_weight: 0.1
  conditioning: concatenation

  match_fn: match_linear
  solver_kwargs: {}
  layer_norm_before_concatenation: false
  linear_projection_before_concatenation: false
  seed: 0
  # megatron_ckpt: null
  megatron_ckpt: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/remote-chen/nemo_cellflow/outputs/aivc-llama-jit-tahoe-x1-set512-dit36/checkpoints/finetune_pearson_best-epoch=331/weights

  cell_sentence_len: ${cell_sentence_len}
  cellmap_width: ${cellmap_width}
  dit_depth: 36
  dit_kwargs:
      num_heads: 16
      mlp_ratio: 4.0
  pred_type: x
  loss_type: x

dataset:
  batch_size: 32
  num_workers: 16
  random_seed: 42
  control_pert: "[('DMSO_TF', 0.0, 'uM')]"
  cell_sentence_len: ${cell_sentence_len}

  global_keys_path: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/master/nemo_cellflow/preprocessing/tahoe/group/global_keys.pkl
  train_lmdb_path: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/master/nemo_cellflow/preprocessing/tahoe/group/tahoe_train
  val_lmdb_path: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/master/nemo_cellflow/preprocessing/tahoe/group/tahoe_val
  test_lmdb_path: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/master/nemo_cellflow/preprocessing/tahoe/group/tahoe_test
  control_lmdb_path: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/master/nemo_cellflow/preprocessing/tahoe/group/tahoe_control

experiment:
  precision: 32
  monitor: val_loss
  ckpt_freq: 100
  use_wandb: true
  seed: 42
  check_val_every_n_epoch: 10
  num_epoch: 500
  strategy: ddp
  time_step: 5
  num_sanity_val_steps: 2

  num_nodes: 1
  num_gpus: 8
  accumulate_grad_batches: 1
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1

  group: aivc-llama-jit-tahoe-x1-set512-dit36

Interpolant:
  probability_path:
        constant_noise: 0.
  prior_distribution: gaussian
  prior_kwargs:
    total_count: 1
    logits: 0.1
    zi_logits: 0

