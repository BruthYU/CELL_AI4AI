dataset_name: tahoe
model_name: NB

cell_sentence_len: 256
cellmap_width: 512

layers_before_pool:
  pert_onehot:
    num_embeddings: 1138
    input_dim: 256
    layer_type: embedding
    dims: [256, 256]
    dropout_rate: 0.0

  batch_onehot:
    num_embeddings: 14
    input_dim: 256
    layer_type: embedding
    dims: [256, 256]
    dropout_rate: 0.0

  cell_type_onehot:
    num_embeddings: 50
    input_dim: 256
    layer_type: embedding
    dims: [256, 256]
    dropout_rate: 0.0

layers_after_pool:
  layer_type: mlp
  input_dim: -1
  dims: [512, 512]
  dropout_rate: 0.0
  act_last_layer: true
  act_fn: SiLU

layers_for_aggregation:
  layer_type: mlp
  input_dim: 1024
  dims: [1024, 512]
  dropout_rate: 0.0
  act_last_layer: true
  act_fn: SiLU

dataset:
  batch_size: 32
  num_workers: 16
  random_seed: 42
  control_pert: "[('DMSO_TF', 0.0, 'uM')]"
  cell_sentence_len: ${cell_sentence_len}

  global_keys_path: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/master/nemo_cellflow/preprocessing/tahoe/group/global_keys.pkl
  train_lmdb_path: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/master/nemo_cellflow/preprocessing/tahoe/group/tahoe_train
  val_lmdb_path: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/master/nemo_cellflow/preprocessing/tahoe/group/tahoe_val
  test_lmdb_path: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/master/nemo_cellflow/preprocessing/tahoe/group/tahoe_test
  control_lmdb_path: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/master/nemo_cellflow/preprocessing/tahoe/group/tahoe_control

Interpolant:
  probability_path:
    constant_noise: 0.0

prepare_model:
  cell_dim: 2000
  learning_rate: 5e-4
  megatron_ckpt: null
  # megatron_ckpt: /mnt/shared-storage-gpfs2/beam-gpfs02/yulang/master/nemo_cellflow/outputs/checkpoints/aivc-replogle-nb-flow-rpe1_20260710_014213/finetune_best-step=5759/weights
  cellmap_width: ${cellmap_width}
  cell_sentence_len: ${cell_sentence_len}
  dit_depth: 16
  act_fn: SiLU
  decoder_dropout: 0.0

  layers_before_pool: ${layers_before_pool}
  layers_after_pool: ${layers_after_pool}
  layers_for_aggregation: ${layers_for_aggregation}
  pooling: attention_token
  pooling_kwargs:
    num_heads: 8
    pool_method: mean
  time_freqs: 512
  time_max_period: 10000
  time_encoder_dims: [1024, 512]
  time_encoder_dropout: 0.0

  n_hidden: 64
  token_dim: 8
  n_tabular_layers: 2
  tabular_n_heads: 8
  tabular_mlp_ratio: 2.0
  rect_mask_rate_min: 0.15
  rect_mask_rate_max: 0.30

  library_size_mode: pseudo_count_sum
  prediction_lib_size_source: control
  eval_output_space: log1p
  eval_nb_mode: sample
  eval_nb_dispersion_source: control_median
  nb_min_dispersion: 0.0001
  nb_eps: 1.0e-8
  nb_loss_weight: 1.0
  flow_loss_weight: 1.0
  src_recon_weight: 1.0
  tgt_recon_weight: 1.0
  endpoint_nb_weight: 0.1
  endpoint_sw_weight: 0.1
  endpoint_sw_n_proj: 64
  endpoint_sw_subsample_size: 128

  tower_lr_scale_start: 2.0
  tower_lr_scale_end: 0.1
  tower_lr_decay_epochs: 140

  cellmap_encoder_kwargs:
    gene_encoder_type: tabular_attention
    dims: [2000, 512]
    n_hidden: 64
    token_dim: 8
    n_tabular_layers: 2
    tabular_n_heads: 8
    tabular_mlp_ratio: 2.0
    dropout_rate: 0.0
    act_fn: SiLU

  cellmap_decoder_kwargs:
    decoder_distribution: nb
    dims: [512, 1024, 4000]
    nb_min_dispersion: 0.0001
    dropout_rate: 0.0
    act_fn: SiLU

  dit_kwargs:
    num_heads: 16
    mlp_ratio: 4.0

  pred_type: v
  loss_type: v

experiment:
  precision: 32
  monitor: val_loss
  ckpt_freq: 50
  use_wandb: true
  seed: 42
  check_val_every_n_epoch: 20
  num_epoch: 200
  strategy: ddp
  time_step: 5
  num_sanity_val_steps: 2

  num_nodes: 1
  num_gpus: 6
  accumulate_grad_batches: 1
  tensor_model_parallel_size: 1
  pipeline_model_parallel_size: 1

  group: aivc-tahoe-nb-flow-set256
