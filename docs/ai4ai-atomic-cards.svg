<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">算法原子设计卡片</title>
  <desc id="desc">展示 AI4AI 从优秀实现中蒸馏出的原子设计卡片，并将卡片组装成新模型方案。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="#f8fafc"/>
  <rect x="48" y="40" width="1104" height="600" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="88" y="94" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">蒸馏优秀设计：原子设计卡片</text>
  <text x="88" y="128" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">每张卡片都必须回答：解决什么问题、证据在哪里、如何迁移、风险是什么、如何 ablation</text>

  <g filter="url(#shadow)">
    <rect x="86" y="174" width="200" height="250" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <rect x="110" y="198" width="72" height="26" rx="13" fill="#2563eb"/>
    <text x="146" y="216" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Encoder</text>
    <text x="110" y="258" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#0f172a">细胞与基因表征</text>
    <text x="110" y="292" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">Cell-by-Gene attention</text>
    <text x="110" y="316" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">gene token / cell set</text>
    <line x1="110" y1="342" x2="262" y2="342" stroke="#bfdbfe"/>
    <text x="110" y="372" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#475569">证据：代码位置</text>
    <text x="110" y="396" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#475569">验证：替换 encoder</text>

    <rect x="302" y="174" width="200" height="250" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
    <rect x="326" y="198" width="118" height="26" rx="13" fill="#16a34a"/>
    <text x="385" y="216" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Condition Fusion</text>
    <text x="326" y="258" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#0f172a">扰动条件注入</text>
    <text x="326" y="292" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">FiLM / adapter / gate</text>
    <text x="326" y="316" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">cross attention fusion</text>
    <line x1="326" y1="342" x2="478" y2="342" stroke="#bbf7d0"/>
    <text x="326" y="372" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#475569">证据：条件编码器</text>
    <text x="326" y="396" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#475569">验证：融合方式对比</text>

    <rect x="518" y="174" width="200" height="250" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <rect x="542" y="198" width="116" height="26" rx="13" fill="#f97316"/>
    <text x="600" y="216" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Distribution</text>
    <text x="542" y="258" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#0f172a">分布预测目标</text>
    <text x="542" y="292" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">NB / Gaussian / energy</text>
    <text x="542" y="316" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">population matching</text>
    <line x1="542" y1="342" x2="694" y2="342" stroke="#fed7aa"/>
    <text x="542" y="372" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#475569">证据：loss 与 head</text>
    <text x="542" y="396" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#475569">验证：点预测对比</text>

    <rect x="734" y="174" width="200" height="250" rx="14" fill="#f5f3ff" stroke="#ddd6fe"/>
    <rect x="758" y="198" width="82" height="26" rx="13" fill="#7c3aed"/>
    <text x="799" y="216" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Dynamics</text>
    <text x="758" y="258" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#0f172a">潜空间动力学</text>
    <text x="758" y="292" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">flow matching</text>
    <text x="758" y="316" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">Sliced Wasserstein</text>
    <line x1="758" y1="342" x2="910" y2="342" stroke="#ddd6fe"/>
    <text x="758" y="372" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#475569">证据：latent regularizer</text>
    <text x="758" y="396" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#475569">验证：权重 ablation</text>

    <rect x="950" y="174" width="200" height="250" rx="14" fill="#ecfeff" stroke="#a5f3fc"/>
    <rect x="974" y="198" width="92" height="26" rx="13" fill="#0891b2"/>
    <text x="1020" y="216" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">Calibration</text>
    <text x="974" y="258" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#0f172a">推理校准</text>
    <text x="974" y="292" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">control delta prior</text>
    <text x="974" y="316" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">endpoint correction</text>
    <line x1="974" y1="342" x2="1126" y2="342" stroke="#a5f3fc"/>
    <text x="974" y="372" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#475569">证据：推理修正</text>
    <text x="974" y="396" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="13" fill="#475569">验证：校准前后对比</text>
  </g>

  <path d="M 188 474 L 1006 474" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <g>
    <circle cx="240" cy="474" r="34" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="240" y="480" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#1d4ed8">选择</text>
    <circle cx="460" cy="474" r="34" fill="#dcfce7" stroke="#86efac"/>
    <text x="460" y="480" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">组合</text>
    <circle cx="680" cy="474" r="34" fill="#ffedd5" stroke="#fdba74"/>
    <text x="680" y="480" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#c2410c">实现</text>
    <circle cx="900" cy="474" r="34" fill="#fce7f3" stroke="#f9a8d4"/>
    <text x="900" y="480" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="16" font-weight="700" fill="#be185d">验证</text>
  </g>

  <rect x="198" y="542" width="804" height="54" rx="12" fill="#0f172a"/>
  <text x="600" y="576" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">从卡片库组装新模型：2-4 个独立机制 + 明确映射位置 + 最小 ablation</text>
</svg>
