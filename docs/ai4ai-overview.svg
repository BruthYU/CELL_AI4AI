<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI4AI 总体介绍</title>
  <desc id="desc">AI 阅读优秀仓库、蒸馏算法原子、设计 NeMo 模型、提交 RJOB 并用指标反馈迭代的闭环图。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="centerGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="52%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="#f8fafc"/>
  <rect x="48" y="40" width="1104" height="600" rx="24" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="88" y="94" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="34" font-weight="700" fill="#0f172a">AI4AI 总体介绍</text>
  <text x="88" y="128" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#475569">以 AI 辅助算法蒸馏、模型设计、平台提交和指标反馈，构建细胞扰动预测模型迭代闭环</text>

  <circle cx="600" cy="344" r="114" fill="url(#centerGradient)" filter="url(#shadow)"/>
  <circle cx="600" cy="344" r="96" fill="#ffffff" opacity="0.94"/>
  <text x="600" y="326" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">AI4AI 闭环</text>
  <text x="600" y="360" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="16" fill="#334155">阅读 · 设计 · 验证 · 反馈</text>
  <text x="600" y="390" text-anchor="middle" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#64748b">每轮都留下代码证据和指标证据</text>

  <path d="M 386 174 C 470 116 730 116 814 174" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M 974 260 C 1050 330 1050 418 974 490" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M 814 550 C 730 612 470 612 386 550" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M 226 490 C 150 418 150 330 226 260" fill="none" stroke="#334155" stroke-width="2.4" marker-end="url(#arrow)"/>
  <path d="M 350 206 L 496 286" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 850 206 L 704 286" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 850 520 L 704 402" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 350 520 L 496 402" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="122" y="156" width="228" height="110" rx="14" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="146" y="196" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#1d4ed8">优秀代码仓库</text>
    <text x="146" y="226" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">论文实现、模型结构</text>
    <text x="146" y="248" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">训练目标与推理逻辑</text>

    <rect x="486" y="128" width="228" height="110" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="510" y="168" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#15803d">蒸馏协议</text>
    <text x="510" y="198" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">提取算法原子</text>
    <text x="510" y="220" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">保留代码证据与风险</text>

    <rect x="850" y="156" width="228" height="110" rx="14" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="874" y="196" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#c2410c">设计协议</text>
    <text x="874" y="226" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">组合 2-4 个机制</text>
    <text x="874" y="248" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">形成可训练新方法</text>

    <rect x="850" y="482" width="228" height="110" rx="14" fill="#fdf2f8" stroke="#fbcfe8"/>
    <text x="874" y="522" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#be185d">NeMo 实现</text>
    <text x="874" y="552" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">统一模型目录与类名</text>
    <text x="874" y="574" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">兼容 loss/eval/predict</text>

    <rect x="486" y="510" width="228" height="110" rx="14" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="510" y="550" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#6d28d9">RJOB 自动化</text>
    <text x="510" y="580" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">训练 · 推理 · 评估</text>
    <text x="510" y="602" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">复用现有提交脚本</text>

    <rect x="122" y="482" width="228" height="110" rx="14" fill="#ecfeff" stroke="#a5f3fc"/>
    <text x="146" y="522" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700" fill="#0e7490">指标反馈</text>
    <text x="146" y="552" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">Delta PCC 与 ablation</text>
    <text x="146" y="574" font-family="Inter, Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="14" fill="#334155">决定下一轮组件选择</text>
  </g>
</svg>
