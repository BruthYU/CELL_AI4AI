MLPBlock:
   input_dim: 512
   dims: [1024, 1024, 1024]
   dropout_rate: 0.0
   act_last_layer: true
   act_fn: SiLU


FilmBlock:
  input_dim: 512
  act_fn: SiLU

ResNetBlock:
  input_dim: 512
  hidden_dims: [256, 256]
  projection_dims: [256, 256]
  act_fn: SiLU
  dropout_rate: 0.0


SelfAttention:
  input_dim: 1024
  num_heads: 8
  qkv_dim: 1024
  dropout_rate: 0.
  transformer_block: false
  layer_norm: false
  act_fn: SiLU

SelfAttentionBlock:
  num_heads: [8]
  qkv_dim: [1024]
  dropout_rate: 0.
  transformer_block: false
  layer_norm: false
  act_fn: SiLU

SeedAttentionPooling:
  num_heads: 8
  v_dim: 768
  seed_dim: 768
  dropout_rate: 0.
  transformer_block: false
  layer_norm: false
  act_fn: SiLU

TokenAttentionPooling:
  num_heads: 8
  qkv_dim: 512
  dropout_rate: 0.
  act_fn: SiLU

BasicMultiHeadAttentionPooling:
  embed_dim: 512
  num_heads: 8
  dropout_rate: 0.0
  pool_method: mean  # "mean" or "first"

TransformerEncoderBlock:
  input_dim: 512
  d_model: 512
  num_heads: 8
  num_layers: 2
  dim_feedforward: 2048
  dropout_rate: 0.1
  act_fn: gelu
  norm_first: true

TransformerDecoderBlock:
  input_dim: 512
  d_model: 512
  output_dim: 512
  num_heads: 8
  num_layers: 2
  dim_feedforward: 2048
  dropout_rate: 0.1
  act_fn: gelu
  norm_first: true


BasicAttentionPooling:
  d_model: 512
  K: 512
  hidden: 512

SetAttentionPooling:
  d_model: 512
  K: 512
  hidden: 512


CellMapEncoder:
  add_pos_emd: true
  input_dim: 512
  dims: [2000, 512]
  output_dim: 512
  input_seq_len: 1024
  output_seq_len: 512

CellMapDecoder:
  input_dim: 512,
  dims: [512, 2000]
  output_dim: 2000
  output_seq_len: 1024

DiTBlock:
  hidden_size: 512
  num_heads: 8
  mlp_ratio: 4.0

ConditionEncoder:
  pooling: attention_token
  pooling_kwargs: {}

MeanPooling: {}
